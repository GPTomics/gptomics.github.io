  <rect x="312" y="290" width="24" height="16" rx="2" class="code-frag"/>
  <rect x="354" y="290" width="24" height="16" rx="2" class="code-frag"/>
  <rect x="396" y="290" width="24" height="16" rx="2" class="code-frag"/>
  <text x="346" y="345" text-anchor="middle" class="caption">PI looks outward.</text>
  <text x="346" y="361" text-anchor="middle" class="caption">Code fragments per student.</text>
  <text x="346" y="385" text-anchor="middle" class="source">Most modern labs.</text>
  <text x="346" y="399" text-anchor="middle" class="source">Pre-agent era.</text>

  <text x="550" y="108" text-anchor="middle" class="colheader">Peer network with agents</text>
  <text x="550" y="124" text-anchor="middle" class="colsub">2026 flat federated pattern</text>
