  <text x="140" y="299" class="nl-code">main code</text>
  <text x="140" y="345" text-anchor="middle" class="caption">PI writes the main code;</text>
  <text x="140" y="361" text-anchor="middle" class="caption">students have their own pieces.</text>
  <text x="140" y="385" text-anchor="middle" class="source">Sanger/Staden,</text>
  <text x="140" y="399" text-anchor="middle" class="source">Heng Li's group.</text>

