  <text x="346" y="124" text-anchor="middle" class="colsub">2020s typical academic lab</text>
  <text x="346" y="153" text-anchor="middle" class="ext-label">grants</text>
  <line x1="346" y1="156" x2="346" y2="172" class="edge-ext" marker-end="url(#arrow)"/>
