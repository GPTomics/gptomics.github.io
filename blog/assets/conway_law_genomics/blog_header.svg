<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" role="img" aria-labelledby="title desc" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Three lab structures, three kinds of code</title>
  <desc id="desc">Three side-by-side academic-lab organizational diagrams comparing how communication structures shape software. Left: a hands-on PI surrounded by students, connected to a single shared codebase. Middle: a managerial PI focused outward on grants, talks, and hiring, with students producing fragmented per-paper code below. Right: a flat peer network — three hands-on PIs and a student-as-peer at the top, each with an AI agent, with PI-to-PI and agent-to-agent links, and a mix of shared and per-lab code modules at the bottom.</desc>

  <style>
    .title { fill: #16122e; font-size: 20px; font-weight: 500; }
    .subtitle { fill: #4d4666; font-size: 13px; font-weight: 400; }
    .colheader { fill: #16122e; font-size: 14px; font-weight: 500; }
    .colsub { fill: #4d4666; font-size: 11px; font-weight: 400; }
    .caption { fill: #4d4666; font-size: 12px; font-weight: 400; }
    .source { fill: #4d4666; font-size: 11px; font-weight: 400; }
    .ext-label { fill: #4d4666; font-size: 10px; font-weight: 400; }
    .role-label { fill: #4d4666; font-size: 9px; font-weight: 400; font-style: italic; }
    .code-label { fill: #4d4666; font-size: 9px; font-weight: 400; }
    .legend { fill: #4d4666; font-size: 11px; font-weight: 400; }
    .nl { fill: #ffffff; font-size: 11px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .nl-sm { fill: #ffffff; font-size: 10px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .nl-xs { fill: #ffffff; font-size: 8px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .nl-code { fill: #ffffff; font-size: 11px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .nl-code-sm { fill: #ffffff; font-size: 9px; font-weight: 500; text-anchor: middle; dominant-baseline: middle; }
    .node-pi { fill: #5d44a8; stroke: #3d2c70; stroke-width: 1; }
    .node-st { fill: #a89ec0; stroke: #6d6296; stroke-width: 1; }
    .node-ag { fill: #c2483a; stroke: #8c2e23; stroke-width: 1; }
    .code-box { fill: #16122e; stroke: #16122e; }
    .code-frag { fill: #4d4666; }
    .edge-s { stroke: #16122e; stroke-width: 1.8; fill: none; }
    .edge-m { stroke: #16122e; stroke-width: 1.5; fill: none; }
    .edge-w { stroke: #b3a8c8; stroke-width: 0.6; fill: none; }
    .edge-ext { stroke: #4d4666; stroke-width: 0.8; fill: none; stroke-dasharray: 3,3; }
    .col-divider { stroke: #e4dff0; stroke-width: 0.5; stroke-dasharray: 2,4; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4d4666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="42" text-anchor="middle" class="title">Three lab structures, three kinds of code</text>
  <text x="340" y="66" text-anchor="middle" class="subtitle">Conway's law: same problem, different communication graphs, different software</text>

  <line x1="246" y1="92" x2="246" y2="404" class="col-divider"/>
  <line x1="446" y1="92" x2="446" y2="404" class="col-divider"/>

